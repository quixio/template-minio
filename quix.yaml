# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: minio
    application: minio
    version: latest
    group: Minio
    deploymentType: Service
    resources:
      cpu: 1000
      memory: 500
      replicas: 1
    state:
      enabled: true
      size: 1
    network:
      serviceName: minio
      ports:
        - port: 9000
          targetPort: 9000
    variables:
      - name: MINIO_ROOT_USER
        inputType: Secret
        description: The root username to initialize Minio with
        required: true
        secretKey: s3_user
      - name: MINIO_ROOT_PASSWORD
        inputType: Secret
        description: The root password to initialize MongoDB with
        required: true
        secretKey: s3_secret
  - name: Minio proxy
    application: minio-proxy
    version: latest
    group: Minio
    deploymentType: Service
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    publicAccess:
      enabled: true
      urlPrefix: minioproxy
    network:
      serviceName: minio-proxy
      ports:
        - port: 80
          targetPort: 80
